<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:512px; height:512px; }
  body { display:flex; align-items:center; justify-content:center; background:transparent; }
  .icon {
    width:512px; height:512px; background:#0d1626;
    position:relative; display:flex; align-items:center; justify-content:center;
    font-family:'Inter',-apple-system,Arial,sans-serif; font-weight:800;
    font-size:256px; letter-spacing:-8px;
  }
  .icon::before { content:""; position:absolute; top:0; left:0; right:0; height:44px; background:#17a589; }
  .a { color:#e8eef5; } .c { color:#1fbf9f; }
</style></head>
<body>
  <div class="icon"><span class="a">A</span><span class="c">C</span></div>
</body></html>
