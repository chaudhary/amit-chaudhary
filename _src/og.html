<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:'Inter',-apple-system,Arial,sans-serif;
    background:#0d1626; color:#e8eef5; position:relative; overflow:hidden;
    background-image:
      radial-gradient(720px 360px at 88% -8%, rgba(23,165,137,0.22), transparent 60%),
      radial-gradient(620px 340px at 0% 8%, rgba(245,166,35,0.10), transparent 55%);
  }
  .bar { position:absolute; top:0; left:0; right:0; height:8px; display:flex; }
  .bar i { flex:1; } .bar i:nth-child(1){background:#17a589}.bar i:nth-child(2){background:#f5a623}
  .bar i:nth-child(3){background:#e8543f}.bar i:nth-child(4){background:#27ae60}
  .pad { padding:84px 88px; height:100%; display:flex; align-items:center; gap:60px; }
  .col { flex:1 1 auto; min-width:0; }
  .portrait { flex:none; width:330px; height:330px; border-radius:50%; object-fit:cover; object-position:center 14%;
    border:5px solid rgba(255,255,255,0.06); box-shadow:0 0 0 9px rgba(23,165,137,0.16); }
  .eyebrow { color:#1fbf9f; font-weight:600; font-size:24px; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:26px; }
  h1 { font-size:82px; font-weight:800; letter-spacing:-0.03em; line-height:1; margin-bottom:30px; }
  h1 .t { color:#1fbf9f; }
  .sub { font-size:32px; color:#93a3b5; font-weight:500; max-width:20ch; line-height:1.3; }
  .sub b { color:#e8eef5; font-weight:600; }
  .foot { position:absolute; left:88px; bottom:74px; display:flex; align-items:center; gap:14px; font-size:24px; color:#93a3b5; }
  .dot { width:14px; height:14px; border-radius:50%; background:#27ae60; box-shadow:0 0 0 6px rgba(39,174,96,0.18); }
  .url { position:absolute; right:88px; bottom:74px; font-family:'JetBrains Mono',monospace; font-size:22px; color:#93a3b5; }
</style></head>
<body>
  <div class="bar"><i></i><i></i><i></i><i></i></div>
  <div class="pad">
    <div class="col">
      <div class="eyebrow">Senior Ruby on Rails Engineer &amp; Architect</div>
      <h1>Amit <span class="t">Chaudhary</span></h1>
      <div class="sub">14+ years building Rails. <b>Independent contractor</b> for US &amp; UK remote teams.</div>
    </div>
    <img class="portrait" src="/assets/img/amit.jpg" alt="Amit Chaudhary" />
  </div>
  <div class="foot"><span class="dot"></span> Open to high-rate contract work</div>
  <div class="url">chaudhary.github.io/amit-chaudhary</div>
</body></html>
