# "Working together" / engagement readiness points
intro: "I'm set up to make hiring an India-based contractor genuinely friction-free for US and UK teams."
points:
  - color: t
    title: Contract-ready, no EOR needed
    body: "Registered sole proprietor in India with valid GST. I sign the W-8BEN directly with US companies and invoice in USD, so engaging me is a contract, not a hiring process."
  - color: o
    title: Proven on contracts
    body: "2+ years working purely on contract for US teams, including a year-plus engagement with Building Intelligence (US physical-security SaaS) via Toptal."
  - color: r
    title: Real US-hours overlap
    body: "Comfortable overlapping US business hours for standups and real-time collaboration, with a long async track record alongside it."
  - color: g
    title: Equipment, your call
    body: "I work on my own professional setup, and I'm equally happy to use a company-provided and managed device if your security policy prefers it."
